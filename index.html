<!DOCTYPE html>
<html>
<head>
<title> Batman </title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Amita">
</head>


<style>
  body{
    font-family: 'Amita'; 
  }
  
.image-container {
  background-image: url("https://cdn.pixabay.com/photo/2021/06/18/11/24/batman-6345922__340.jpg");
  background-size: cover;
  position: relative;
  height: 600px;
}

.text {
  background-color: Yellow;
  color: black;
  font-size: 10vw; 
  font-weight: bold;
  margin: 0 auto;
  padding: 10px;
  width: 50%;
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  mix-blend-mode: screen;
}
  

</style>

<body>

<div class="image-container">
  <div class="text">Batman</div>
</div>


</html>
